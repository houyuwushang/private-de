run:
  dataset_name: smoke
  input_csv: outputs/smoke_input.csv
  output_dir: outputs/smoke_qdte
  seed: 0

preprocess:
  numerical_bins: 8
  missing_token: __MISSING__
  label_column: label
  numerical_columns: [c, d]
  categorical_columns: [a, b, label]

workload:
  include_oneway: true
  include_2way_cat: true
  include_prefix: true
  include_range: true
  include_mixed: true
  max_queries: 400
  max_terms: 4
  range_intervals_per_num_attr: 8
  mixed_queries_per_pair: 8
  max_2way_cells: 150
  random_seed: 0

privacy:
  mode: dp
  rho_total: 1.0
  delta: 1.0e-9
  measurement_mode: static_all
  measurement_allocation:
    oneway: 0.25
    twoway: 0.25
    prefix: 0.15
    range: 0.15
    mixed: 0.20

projection:
  project_partitions: true
  clip_nonpartition: true
  prefix_monotonicity: false

init:
  N_syn: same_as_real
  method: independent_oneway

qdte:
  score_backend: dense_gpu
  transport_mode: microbatch_greedy
  max_iters: 100
  num_active_targets: 16
  candidates_per_target: 16
  total_candidates_per_iter: 256
  accepted_per_iter: 8
  kappa_noise: 0.5
  lambda_cost: 0.0
  numerical_distance_gamma: 0.1
  random_candidate_fraction: 0.05
  source_over_sample_factor: 8
  full_recompute_every: 20
  stop_patience: 15
  min_advantage: 1.0e-6
  log_every: 10

runtime:
  use_pmap: false
  scoring_chunk_size: 256
  answer_batch_size: 512
  xla_preallocate: false

evaluation:
  compute_true_query_error: true
  downstream_ml: false
  save_synthetic_csv: true
